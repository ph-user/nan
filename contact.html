<script>
  const dropdown = document.getElementById('works-dropdown');
  const dropdownContent = dropdown.querySelector('.dropdown-content');

  // We use "touchstart" for mobile to ensure it's responsive
  const toggleMenu = function(e) {
    e.stopPropagation();
    dropdownContent.classList.toggle('show');
  };

  dropdown.addEventListener('click', toggleMenu);

  // Use 'pointerdown' to capture clicks/taps globally
  window.addEventListener('pointerdown', function(event) {
    if (dropdownContent.classList.contains('show') && !dropdown.contains(event.target)) {
      dropdownContent.classList.remove('show');
    }
  });

  // Image protection
  document.addEventListener("contextmenu", function (e) {
    if (e.target.tagName === "IMG") e.preventDefault();
  });
</script>
